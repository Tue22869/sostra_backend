services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sostra}
      POSTGRES_USER: ${POSTGRES_USER:-sostra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sostra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-backup:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sostra}
      POSTGRES_USER: ${POSTGRES_USER:-sostra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sostra}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_BACKUP_DIR: /backups
      POSTGRES_BACKUP_KEEP_DAYS: ${POSTGRES_BACKUP_KEEP_DAYS:-7}
      POSTGRES_BACKUP_INTERVAL_SECONDS: ${POSTGRES_BACKUP_INTERVAL_SECONDS:-86400}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/postgres-backup.sh:/usr/local/bin/postgres-backup.sh:ro
      - ./backups/postgres:/backups
    entrypoint: ["/bin/sh", "/usr/local/bin/postgres-backup.sh"]

  django:
    build: .
    command: gunicorn myproject.wsgi -c gunicorn.conf.py
#    ports:
#      - "8001:8080"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      ENABLE_CRON: "1"
      RUN_MIGRATIONS: "1"
      RUN_CREATE_GROUPS: "1"

  tgbot:
    build: .
    command: python manage.py runbot
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      ENABLE_CRON: "0"
      RUN_MIGRATIONS: "0"
      RUN_CREATE_GROUPS: "0"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8000:8000"
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
      - ./pwa:/pwa:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - django

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c "
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet &&
          nginx -s reload;
          sleep 12h;
        done"
#  Команда получения сертификата:
#  certbot certonly --webroot \
#  -w /var/www/certbot \
#  -d appsostra.ru -d storage.appsostra.ru -d admin.appsostra.ru -d web.appsostra.ru


volumes:
  static_volume:
  media_volume:
  postgres_data:
